services:
  - type: web
    name: mcp-chat-agent
    env: node
    buildCommand: npm install && pip3 install uv && uv sync --frozen
    startCommand: npm start
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    autoDeploy: true